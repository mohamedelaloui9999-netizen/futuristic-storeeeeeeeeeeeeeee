<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>👽 Mohamed Al-Aloui | المتجر الآمن</title>
<meta name="author" content="Mohamed Al-Aloui">
<style>
:root {
  --cyan: #00fff7;
  --magenta: #ff00f7;
  --yellow: #ffee00;
  --dark: #03030a;
  --dark2: #0a0a15;
  --light-gray: #a0a0a0;
  --neon-cyan: 0 0 10px #00fff7, 0 0 20px #00fff7;
  --neon-magenta: 0 0 10px #ff00f7, 0 0 20px #ff00f7;
  --neon-mix: 0 0 10px #00fff7, 0 0 20px #ff00f7;
}
* { user-select: none; -webkit-user-select: none; }
input, textarea { user-select: text; }
body {
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', Tahoma, sans-serif;
  background: var(--dark);
  color: var(--light-gray);
  overflow-x: hidden;
}
a, button { cursor: pointer; }

/* Preloader */
#preloader {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: var(--dark);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 999999999;
}
.alien-icon {
  width: 120px;
  animation: float 2s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0) rotate(-5deg); }
  50% { transform: translateY(-20px) rotate(5deg); }
}
.preloader-text {
  color: var(--cyan);
  font-size: 1.5em;
  margin-top: 20px;
  text-shadow: var(--neon-cyan);
}
.progress-container {
  width: 300px;
  height: 4px;
  background: #1a1a2e;
  border-radius: 10px;
  margin-top: 20px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--cyan), var(--magenta));
  width: 0%;
  animation: loadProgress 2.5s ease forwards;
}
@keyframes loadProgress { to { width: 100%; } }

/* Navbar */
.navbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: rgba(3, 3, 10, 0.95);
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 99999;
  border-bottom: 1px solid rgba(0, 255, 247, 0.1);
}
.nav-logo {
  font-size: 1.5em;
  font-weight: bold;
  color: var(--cyan);
  text-shadow: var(--neon-cyan);
}
.nav-links {
  display: flex;
  gap: 25px;
  list-style: none;
}
.nav-links a {
  color: var(--light-gray);
  text-decoration: none;
  transition: 0.3s;
}
.nav-links a:hover { color: var(--cyan); text-shadow: var(--neon-cyan); }
.cart-icon {
  position: relative;
  font-size: 1.5em;
  cursor: pointer;
}
.cart-count {
  position: absolute;
  top: -8px;
  right: -8px;
  background: var(--magenta);
  color: white;
  font-size: 0.7em;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Hero */
header.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 100px 20px 50px;
  background: radial-gradient(ellipse at 20% 20%, rgba(0, 255, 247, 0.1) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 80%, rgba(255, 0, 247, 0.1) 0%, transparent 50%),
              var(--dark);
}
.profile-img {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  border: 4px solid var(--cyan);
  box-shadow: var(--neon-mix);
  object-fit: cover;
  animation: profileGlow 3s ease-in-out infinite alternate;
}
@keyframes profileGlow {
  0% { box-shadow: var(--neon-mix); }
  100% { box-shadow: 0 0 50px var(--magenta), 0 0 80px var(--magenta); }
}
.hero h1 {
  font-size: 3em;
  margin: 20px 0 10px;
  background: linear-gradient(90deg, var(--cyan), var(--magenta));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.hero .subtitle {
  font-size: 1.3em;
  color: #666680;
  margin-bottom: 20px;
}
.social-links {
  display: flex;
  gap: 15px;
  margin-top: 25px;
}
.social-links a {
  width: 50px;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(0, 255, 247, 0.3);
  color: var(--cyan);
  font-size: 1.3em;
  text-decoration: none;
  transition: 0.3s;
}
.social-links a:hover {
  background: var(--cyan);
  color: var(--dark);
  transform: translateY(-5px);
  box-shadow: var(--neon-cyan);
}

/* Sections */
section {
  max-width: 1000px;
  margin: 50px auto;
  padding: 35px;
  background: linear-gradient(135deg, var(--dark2) 0%, #111122 100%);
  border-radius: 25px;
  border: 1px solid rgba(0, 255, 247, 0.1);
}
section h2 {
  font-size: 2em;
  text-align: center;
  margin-bottom: 30px;
  background: linear-gradient(90deg, var(--cyan), var(--magenta));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
section h2::after {
  content: '';
  display: block;
  width: 60px;
  height: 3px;
  background: linear-gradient(90deg, var(--cyan), var(--magenta));
  margin: 15px auto 0;
  border-radius: 2px;
}
section p {
  font-size: 1.1em;
  line-height: 1.9;
  color: var(--light-gray);
}

/* About Stats */
.about-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-top: 30px;
}
.stat-card {
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 15px;
  padding: 25px;
  text-align: center;
  transition: 0.3s;
}
.stat-card:hover {
  border-color: var(--cyan);
  box-shadow: var(--neon-cyan);
  transform: translateY(-5px);
}
.stat-number {
  font-size: 2em;
  font-weight: bold;
  color: var(--cyan);
}
.stat-label { color: #666680; font-size: 0.9em; }

/* Goals */
.goals-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}
.goal-card {
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 20px;
  padding: 30px;
  text-align: center;
  transition: 0.4s;
}
.goal-card:hover {
  border-color: var(--magenta);
  box-shadow: var(--neon-magenta);
  transform: translateY(-10px);
}
.goal-icon { font-size: 2.5em; margin-bottom: 15px; }
.goal-card h3 { color: var(--cyan); margin-bottom: 10px; }

/* Skills */
.skills-container {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  justify-content: center;
}
.skill-tag {
  padding: 12px 25px;
  background: rgba(0, 255, 247, 0.1);
  border: 1px solid var(--cyan);
  border-radius: 25px;
  color: var(--cyan);
  font-weight: 500;
  transition: 0.3s;
}
.skill-tag:hover {
  background: var(--cyan);
  color: var(--dark);
  box-shadow: var(--neon-cyan);
}

/* Products Grid */
.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
  gap: 25px;
}
.product-card {
  background: linear-gradient(180deg, #0d0d20 0%, #080812 100%);
  padding: 25px;
  border-radius: 20px;
  border: 1px solid rgba(0, 255, 247, 0.15);
  text-align: center;
  transition: 0.4s;
  position: relative;
}
.product-card:hover {
  transform: translateY(-10px);
  border-color: var(--magenta);
  box-shadow: 0 15px 40px rgba(255, 0, 247, 0.2);
}
.product-image {
  width: 140px;
  height: 140px;
  border: 2px solid var(--cyan);
  border-radius: 15px;
  object-fit: contain;
  background: rgba(0, 0, 0, 0.3);
  margin-bottom: 15px;
}
.product-name {
  font-size: 1.3em;
  color: var(--cyan);
  margin: 10px 0;
}
.product-desc {
  font-size: 0.95em;
  color: #777;
  min-height: 45px;
}
.product-price {
  font-size: 1.4em;
  font-weight: bold;
  color: var(--magenta);
  margin: 15px 0;
}
.buy-btn {
  padding: 12px 35px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(135deg, var(--cyan), var(--magenta));
  color: #000;
  font-weight: bold;
  font-size: 1em;
  cursor: pointer;
  transition: 0.3s;
}
.buy-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 30px var(--cyan);
}

/* Admin Buttons */
.admin-btns {
  display: none;
  margin-top: 15px;
  gap: 8px;
  justify-content: center;
}
.admin-btns.show { display: flex; }
.admin-btns button {
  padding: 8px 16px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.85em;
  font-weight: bold;
  transition: 0.3s;
}
.edit-btn { background: #2196F3; color: white; }
.delete-btn { background: #ff0055; color: white; }
.edit-btn:hover { box-shadow: 0 0 15px #2196F3; }
.delete-btn:hover { box-shadow: 0 0 15px #ff0055; }

/* Contact Form */
.contact-form {
  max-width: 600px;
  margin: 0 auto;
}
.form-group { margin-bottom: 20px; }
.form-group input, .form-group textarea {
  width: 100%;
  padding: 15px;
  border: 1px solid rgba(0, 255, 247, 0.3);
  border-radius: 10px;
  background: rgba(0, 0, 0, 0.3);
  color: white;
  font-size: 1em;
  transition: 0.3s;
}
.form-group input:focus, .form-group textarea:focus {
  outline: none;
  border-color: var(--cyan);
  box-shadow: var(--neon-cyan);
}
.form-group textarea { height: 150px; resize: none; }
.submit-btn {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(135deg, var(--cyan), var(--magenta));
  color: #000;
  font-weight: bold;
  font-size: 1.1em;
  cursor: pointer;
  transition: 0.3s;
}
.submit-btn:hover {
  transform: scale(1.02);
  box-shadow: 0 0 30px var(--cyan);
}

/* Footer */
footer {
  text-align: center;
  padding: 30px;
  background: #0a0a15;
  color: var(--cyan);
  font-weight: bold;
  border-top: 1px solid rgba(0, 255, 247, 0.2);
}

/* Admin Trigger */
#admin-trigger {
  position: fixed;
  bottom: 5px;
  left: 5px;
  opacity: 0.05;
  font-size: 10px;
  color: #333;
  cursor: pointer;
  transition: 0.3s;
}
#admin-trigger:hover { opacity: 1; color: var(--cyan); }

/* Admin Login */
#admin-login {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(3, 3, 10, 0.98);
  z-index: 99999999;
  align-items: center;
  justify-content: center;
}
#admin-login.show { display: flex; }
.login-box {
  background: #0d0d1a;
  border: 2px solid var(--magenta);
  border-radius: 20px;
  padding: 40px;
  text-align: center;
  max-width: 380px;
  width: 90%;
  box-shadow: 0 0 50px rgba(255, 0, 247, 0.3);
}
.login-box h2 { color: var(--magenta); margin-bottom: 30px; }
.login-box input {
  width: 100%;
  padding: 15px;
  margin-bottom: 20px;
  border: 2px solid rgba(255, 0, 247, 0.3);
  border-radius: 10px;
  background: rgba(0, 0, 0, 0.5);
  color: white;
  font-size: 1.1em;
  text-align: center;
}
.login-box button {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(135deg, var(--magenta), var(--cyan));
  color: black;
  font-weight: bold;
  font-size: 1.1em;
  cursor: pointer;
}
.admin-error { color: #ff0055; margin-top: 15px; display: none; }

/* Admin Panel */
#admin-panel {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: var(--dark);
  z-index: 99999999;
  padding: 20px;
  overflow-y: auto;
}
#admin-panel.show { display: block; }
.admin-header { text-align: center; margin-bottom: 30px; }
.admin-header h2 { color: var(--cyan); }
.close-admin {
  position: fixed;
  top: 20px;
  right: 20px;
  font-size: 2em;
  cursor: pointer;
  color: #ff0055;
  transition: 0.3s;
}
.close-admin:hover { transform: scale(1.2); }
.add-product-form {
  max-width: 500px;
  margin: 0 auto 40px;
  background: #0d0d1a;
  padding: 30px;
  border-radius: 15px;
  border: 2px solid var(--cyan);
}
.add-product-form h3 { color: var(--cyan); margin-bottom: 20px; }
.add-product-form input {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border: 1px solid var(--cyan);
  border-radius: 8px;
  background: #010111;
  color: white;
  font-size: 1em;
}
.add-product-form button {
  width: 100%;
  padding: 15
